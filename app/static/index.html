<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recall RAG System</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar for Syncing -->
        <aside class="sidebar">
            <div class="logo-container">
                <div class="logo-icon"></div>
                <h1>Recall RAG</h1>
            </div>
            
            <div class="sync-section">
                <h2>Knowledge Base Sync</h2>
                <p>Paste a Google Drive URL to ingest specific documents, or leave blank to sync all available files.</p>
                
                <input type="text" id="gdrive-url" placeholder="https://docs.google.com/document/d/..." autocomplete="off">
                <button id="sync-btn" onclick="syncDrive()">
                    <span class="btn-text">Sync Document</span>
                    <div class="spinner" id="sync-spinner"></div>
                </button>
                <div id="sync-status" class="status-msg"></div>
            </div>
        </aside>

        <!-- Main Chat Interface -->
        <main class="chat-container">
            <header class="chat-header">
                <h2>RAG Assistant</h2>
                <div class="status-badge">Online</div>
            </header>
            
            <div class="chat-messages" id="chat-messages">
                <div class="message ai">
                    <div class="message-content">
                        Hello! I am connected to your Google Drive knowledge base. Ask me anything.
                    </div>
                </div>
            </div>
            
            <div class="chat-input-area">
                <input type="text" id="file-filter" placeholder="Filter by filename (optional)...">
                <div class="input-wrapper">
                    <input type="text" id="chat-input" placeholder="Ask a question about your documents..." onkeypress="handleKeyPress(event)">
                    <button id="send-btn" onclick="askQuestion()">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="/script.js"></script>
</body>
</html>
